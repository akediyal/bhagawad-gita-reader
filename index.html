<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vedic Scriptures Reader</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Sanskrit:ital@0;1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="vh-100 d-flex flex-column">
    <nav
      class="top-nav px-4 flex-shrink-0 d-flex align-items-center justify-content-between"
    >
      <h1 class="nav-brand m-0 fw-bold">Bhagavad Gita</h1>

      <div class="d-flex gap-3 align-items-center">
        <select
          id="top-chapter-select"
          class="form-select custom-select w-auto"
        >
          <option value="" selected disabled>Select Chapter</option>
        </select>
        <select
          id="top-verse-select"
          class="form-select custom-select w-auto"
          disabled
        >
          <option value="" selected disabled>Select Verse</option>
        </select>
        <button id="theme-toggle" class="btn custom-btn">🌓</button>
      </div>
    </nav>

    <div class="d-flex flex-grow-1 overflow-hidden">
      <aside id="sidebar" class="p-3 flex-shrink-0 overflow-auto">
        <ul id="tree-root" class="tree-list"></ul>
      </aside>

      <main
        class="main-content flex-grow-1 overflow-auto p-4 p-md-5 d-flex justify-content-center align-items-start"
      >
        <div id="reading-area" class="w-100" style="max-width: 900px">
          <p class="text-center mt-5 fs-5 theme-text-muted">
            Select a chapter or verse to begin.
          </p>
        </div>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
